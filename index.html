<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>workout tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
<style>
* {
  box-sizing: border-box;
}
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
body {
  background: #000;
  color: #d1d5db;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
  padding: 12px;
}
.dashboard {
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  margin: 0 0 16px 0;
  padding: 12px;
  font-family: monospace;
  font-size: 13px;
  flex-shrink: 0;
}
.dashboard-section {
  margin-bottom: 16px;
}
.dashboard-section:last-child {
  margin-bottom: 0;
}
.dashboard-label {
  color: #22c55e;
  font-weight: bold;
  border-bottom: 1px dashed #2a2a2a;
  padding-bottom: 2px;
  margin-bottom: 6px;
  display: inline-block;
  width: 100%;
}
.dashboard-content {
  white-space: pre-wrap;
  font-family: monospace;
}
#today-stats, #exercise-stats, #weight-stats {
  margin: 0;
  white-space: pre-wrap;
}
#heatmap {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 4px;
  vertical-align: middle;
}
.cell {
  width: min(10px, 3vw);
  height: min(10px, 3vw);
  background: #1a1a1a;
  border-radius: 1px;
  transition: background 0.1s, transform 0.05s;
  display: inline-block;
  cursor: pointer;
}
.cell.active { background: #22c55e; }
.cell:active {
  transform: scale(0.95);
}
#terminal {
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}
#log {
  white-space: pre-wrap;
  overflow-y: auto;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.4;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #2a2a2a #0a0a0a;
}
#log::-webkit-scrollbar {
  width: 6px;
}
#log::-webkit-scrollbar-track {
  background: #0a0a0a;
}
#log::-webkit-scrollbar-thumb {
  background: #2a2a2a;
  border-radius: 3px;
}
#log::-webkit-scrollbar-thumb:hover {
  background: #22c55e;
}
#line {
  display: flex;
  align-items: center;
  gap: 6px;
  border-top: 1px solid #2a2a2a;
  padding-top: 8px;
  margin-top: 4px;
  flex-shrink: 0;
}
#prompt {
  font-weight: bold;
  color: #22c55e;
}
input {
  background: none;
  border: none;
  outline: none;
  color: #d1d5db;
  font-family: inherit;
  flex: 1;
  font-size: 13px;
  padding: 4px 0;
}
.err { color: #ef4444; }
.success { color: #22c55e; }
.info { color: #facc15; }
.tooltip {
  position: absolute;
  background: #000;
  border: 1px solid #22c55e;
  padding: 8px 12px;
  font-size: 12px;
  white-space: pre;
  z-index: 100;
  border-radius: 4px;
  pointer-events: auto;
  max-width: 80vw;
  word-wrap: break-word;
}
#loading {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #000;
  border: 1px solid #22c55e;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 4px;
  display: none;
  font-family: monospace;
}
/* Mobile improvements */
@media (max-width: 600px) {
  body {
    padding: 8px;
  }
  .dashboard {
    padding: 16px;
    font-size: 15px;
  }
  .dashboard-label {
    font-size: 16px;
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  .dashboard-content {
    font-size: 14px;
  }
  .cell {
    width: min(14px, 4vw);
    height: min(14px, 4vw);
  }
  #heatmap {
    gap: 6px; /* increased spacing on mobile */
  }
  #log {
    font-size: 15px;
  }
  #prompt {
    font-size: 15px;
  }
  input {
    font-size: 15px;
  }
  .tooltip {
    font-size: 14px;
    padding: 10px 14px;
  }
}
</style>
</head>
<body>

<div class="dashboard">
  <div class="dashboard-section">
    <div class="dashboard-label">[ HEATMAP ]</div>
    <div id="heatmap" class="dashboard-content"></div>
  </div>
  <div class="dashboard-section">
    <div class="dashboard-label">[ TODAY ]</div>
    <div id="today-stats" class="dashboard-content"></div>
  </div>
  <div class="dashboard-section">
    <div class="dashboard-label">[ STATS ]</div>
    <div id="exercise-stats" class="dashboard-content"></div>
    <div id="weight-stats" class="dashboard-content" style="margin-top: 8px;"></div>

</div>

<div id="terminal">
  <div id="log"></div>
  <div id="line">
    <span id="prompt">(guest)</span><span id="offline-indicator"></span><span>></span>
    <input id="cmd" autocomplete="off" spellcheck="false" autocapitalize="none">
  </div>
</div>
<div id="tooltip" class="tooltip" style="display:none"></div>
<div id="loading">[sync]</div>

<script>
// ---------- CONFIG ----------
const SUPABASE_URL = 'https://ptlccumwheypalpvbhms.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0bGNjdW13aGV5cGFscHZiaG1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDY4MzQsImV4cCI6MjA5MDAyMjgzNH0.LkvF84QWKntY4-3YHtBvN_ygRsn4QJleFuA5pnpwsvU';
const PASSWORD = 'mubi';

// default exercises
const defaultMap = { pu:'Push-ups', sq:'Squats', cr:'Crunches', pl:'Plank' };
let customExercises = {};
try {
  const stored = localStorage.getItem('customExercises');
  if (stored) customExercises = JSON.parse(stored);
} catch(e) {}
let map = { ...defaultMap, ...customExercises };

// auth
let auth = localStorage.getItem('auth') === 'true';
let awaitingPassword = false;

// confirmation state
let awaitingConfirmation = false;
let confirmationCallback = null;
let confirmationArgs = null;

// DOM elements
const logEl = document.getElementById('log');
const cmd = document.getElementById('cmd');
const tooltip = document.getElementById('tooltip');
const loadingDiv = document.getElementById('loading');
const offlineSpan = document.getElementById('offline-indicator');
const todayStatsDiv = document.getElementById('today-stats');
const exerciseStatsDiv = document.getElementById('exercise-stats');
const weightStatsDiv = document.getElementById('weight-stats');

// history
let history = [];
let hIndex = 0;
try {
  const savedHistory = localStorage.getItem('cmdHistory');
  if (savedHistory) history = JSON.parse(savedHistory);
  hIndex = history.length;

let heatmapStart = null;
try {

let currentAbortController = null;

// ---------- INDEXEDDB (with compound key to prevent duplicates) ----------
const db = new Dexie('TrackerDB');
db.version(1).stores({
  workouts: '[name+date], name, date, value, name_raw',
  weights: 'date, value',
  pendingOps: '++id, type, payload, timestamp'
});

function isOnline() { return navigator.onLine; }

function updatePrompt() {
  const promptSpan = document.getElementById('prompt');
  if (!auth) promptSpan.textContent = '(guest)';
  else promptSpan.textContent = '';
  offlineSpan.textContent = isOnline() ? '' : ' (offline)';
}

function setLoading(show) {
  loadingDiv.style.display = show ? 'block' : 'none';
}

function print(text, className = '') {
  const div = document.createElement('div');
  if (className) div.className = className;
  div.textContent = text;
  logEl.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function validDate(d) { return /^\d{4}-\d{2}-\d{2}$/.test(d); }
function isFutureDate(dateStr) { return dateStr > today(); }

function parseDuration(value) {
  const str = String(value).trim();
  if (str.endsWith('s')) {
    const num = parseInt(str.slice(0, -1), 10);
    if (!isNaN(num)) return num;
  }
  if (str.includes(':')) {
    const parts = str.split(':');
    if (parts.length === 2) {
      const mins = parseInt(parts[0], 10);
      const secs = parseInt(parts[1], 10);
      if (!isNaN(mins) && !isNaN(secs)) return mins * 60 + secs;
    }
  }
  return null;
}

function formatDuration(seconds) {
  if (seconds < 60) return `${seconds}s`;
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return secs ? `${mins}m ${secs}s` : `${mins}m`;
}

// Helper to strip local id from payload before sending to Supabase
function sanitizePayload(payload) {
  const copy = { ...payload };
  delete copy.id;
  delete copy.timestamp;
  return copy;
}

// --- Sync helpers with proper error checking ---
async function pullFromSupabase(abortSignal) {
  if (!isOnline()) return false;
  setLoading(true);
  try {
    const [workoutsRes, weightsRes] = await Promise.all([
      sb.from('workouts').select('*'),
      sb.from('weights').select('*')
    ]);
    if (abortSignal?.aborted) throw new Error('Aborted');
    if (workoutsRes.error) throw new Error(`Workouts pull: ${workoutsRes.error.message}`);
    if (weightsRes.error) throw new Error(`Weights pull: ${weightsRes.error.message}`);
    
    await db.workouts.clear();
    if (workoutsRes.data) await db.workouts.bulkAdd(workoutsRes.data);
    await db.weights.clear();
    if (weightsRes.data) await db.weights.bulkAdd(weightsRes.data);
    return true;
  } catch(e) {
    if (e.message !== 'Aborted') print(`Pull error: ${e.message}`, 'err');
    return false;
  } finally {
    setLoading(false);
  }
}

async function pushPendingOps(abortSignal) {
  if (!isOnline()) return true;
  setLoading(true);
  let allSucceeded = true;
  try {
    const pending = await db.pendingOps.toArray();
    for (const op of pending) {
      if (abortSignal?.aborted) throw new Error('Aborted');
      try {
        const safePayload = sanitizePayload(op.payload);
        let result;
        if (op.type === 'insert_workout') {
          result = await sb.from('workouts').insert(safePayload);
        } else if (op.type === 'delete_workout') {
          result = await sb.from('workouts').delete().match(safePayload);
        } else if (op.type === 'insert_weight') {
          result = await sb.from('weights').insert(safePayload);
        } else if (op.type === 'delete_weight') {
          result = await sb.from('weights').delete().match(safePayload);
        } else {
          continue;
        }
        if (result.error) {
          print(`Failed to sync operation: ${result.error.message}`, 'err');
          print(`  ${op.type}: ${JSON.stringify(safePayload).slice(0, 100)}`, 'info');
          allSucceeded = false;
        } else {
          await db.pendingOps.delete(op.id);
        }
      } catch(e) {
        print(`Sync operation threw: ${e.message}`, 'err');
        allSucceeded = false;
      }
    }
  } catch(e) {
    if (e.message !== 'Aborted') print(`Push error: ${e.message}`, 'err');
    allSucceeded = false;
  } finally {
    setLoading(false);
  }
  return allSucceeded;
}

async function syncToSupabase(type, payload, silent = false) {
  const safePayload = sanitizePayload(payload);
  if (!isOnline()) {
    await db.pendingOps.add({ type, payload: safePayload, timestamp: Date.now() });
    if (!silent) print(`[queued] ${JSON.stringify(safePayload).slice(0, 60)}`, 'info');
    return false;
  }
  try {
    let result;
    if (type === 'insert_workout') {
      result = await sb.from('workouts').insert(safePayload);
    } else if (type === 'delete_workout') {
      result = await sb.from('workouts').delete().match(safePayload);
    } else if (type === 'insert_weight') {
      result = await sb.from('weights').insert(safePayload);
    } else if (type === 'delete_weight') {
      result = await sb.from('weights').delete().match(safePayload);
    } else {
      return false;
    }
    if (result.error) {
      print(`Supabase error: ${result.error.message}`, 'err');
      await db.pendingOps.add({ type, payload: safePayload, timestamp: Date.now() });
      return false;
    }
    return true;
  } catch(e) {
    print(`Supabase exception: ${e.message}`, 'err');
    await db.pendingOps.add({ type, payload: safePayload, timestamp: Date.now() });
    return false;
  }
}

// --- Safe push (only for authenticated users) ---
async function performPush(abortSignal, silent = false) {
  if (!auth) {
    if (!silent) print('Login required to push', 'err');
    return false;
  }
  if (!isOnline()) {
    if (!silent) print('Offline – cannot push', 'err');
    return false;
  }
  const pendingCount = await db.pendingOps.count();
  if (pendingCount === 0) {
    if (!silent) print('Nothing to push', 'info');
    return true;
  }
  if (!silent) print('Pushing changes...', 'info');
  const success = await pushPendingOps(abortSignal);
  if (abortSignal?.aborted) {
    if (!silent) print('Push cancelled', 'info');
    return false;
  }
  if (success) {
    if (!silent) print('Push completed', 'success');
  } else {
    if (!silent) print('Some pending operations failed. Run "pending" to see queued items.', 'err');
  }
  await loadFromLocal();
  return success;
}

// --- Pull (allowed for anyone) ---
async function performPull(abortSignal) {
  if (!isOnline()) { print('Offline – cannot pull', 'err'); return false; }
  print('Pulling from server...', 'info');
  const success = await pullFromSupabase(abortSignal);
  if (success) {
    print('Pull completed – local data replaced with server data', 'success');
  } else {
    print('Pull failed', 'err');
  }
  await loadFromLocal();
  return success;
}

// --- Core data operations (using upsert via put for workouts) ---
async function storeWorkout(ex, val, date, append = false, skipConfirm = false) {
  if (!auth) throw new Error('Not authenticated');
  const name = map[ex] || ex;
  const key = `${name}|${date}`;
  const existing = await db.workouts.get(key);
  const existingValue = existing ? existing.value : null;
  
  if (!append && existing && !skipConfirm) {
    throw { needConfirm: true, message: `Overwrite ${name} on ${date} (current ${existingValue}) with ${val}? (y/n)`, type: 'overwrite', data: { ex, val, date, name, existingValue, append: false } };
  }
  
  let newVal = val;
  if (append && existing) {
    newVal = existing.value + val;
  }
  const entry = { name_raw: ex, name, value: newVal, date };
  await db.workouts.put(entry); // upsert using compound key
  const synced = await syncToSupabase('insert_workout', entry);
  return { synced, entry, replaced: !append && !!existing, existingValue, appended: append && !!existing };
}

async function storeWeight(val, date, skipConfirm = false) {
  if (!auth) throw new Error('Not authenticated');
  const existing = await db.weights.get(date);
  const existingValue = existing ? existing.value : null;
  
  if (existing && !skipConfirm) {
    throw { needConfirm: true, message: `Overwrite weight on ${date} (current ${existingValue}) with ${val} kg? (y/n)`, type: 'overwrite_weight', data: { val, date, existingValue } };
  }
  
  await db.weights.put({ date, value: val });
  const synced = await syncToSupabase('insert_weight', { value: val, date });
  return { synced, replaced: !!existing, existingValue };
}

// --- UI refresh ---
async function loadFromLocal() {
  const workouts = await db.workouts.toArray();
  const weights = await db.weights.toArray();
  const sortedWeights = weights.sort((a,b) => new Date(b.date) - new Date(a.date));
  updateDashboard(workouts, sortedWeights);
  generateHeatmap(workouts, weights);
  window.weightsMap = {};
  weights.forEach(w => window.weightsMap[w.date] = w.value);
}

function updateDashboard(workouts, weights) {
  const t = today();
  // Aggregate per exercise (sum per day) – with our new model, each date has exactly one value per name
  const perEx = {};
  workouts.forEach(w => {
    if (!perEx[w.name]) perEx[w.name] = {};
    if (!perEx[w.name][w.date]) perEx[w.name][w.date] = 0;
    perEx[w.name][w.date] += w.value;
  });
  // Today's stats
  let todayStr = '';
  Object.keys(perEx).forEach(name => {
    const todayVal = perEx[name][t] || '—';
    if (todayVal !== '—') {
      todayStr += `${name}: ${todayVal}\n`;
    }
  });
  if (todayStr === '') todayStr = 'No activity logged today.\n';
  // Add today's weight
  const todayWeight = weights.find(w => w.date === t);
  if (todayWeight) {
    const roundedWeight = Math.round(todayWeight.value * 10) / 10;
    todayStr += `Weight: ${roundedWeight} kg\n`;
  }
  todayStatsDiv.innerHTML = todayStr.replace(/\n/g, '<br>');

  // Exercise stats (best, last)
  let exStats = '';
  Object.keys(perEx).forEach(name => {
    const dates = Object.keys(perEx[name]).sort().reverse();
    const best = Math.max(...Object.values(perEx[name]));
    const lastDate = dates.find(d => d !== t);
    const lastVal = lastDate ? perEx[name][lastDate] : null;
    exStats += `${name}: best ${best}${lastVal ? `, last ${lastVal}` : ''}\n`;
  });
  exerciseStatsDiv.innerHTML = exStats.replace(/\n/g, '<br>');

  // Weight stats with delta (rounded to 1 decimal)
  let weightStats = '';
  if (weights.length) {
    const sorted = weights.sort((a,b) => new Date(b.date) - new Date(a.date));
    const latest = sorted[0];
    const prev = sorted[1];
    let delta = '';
    if (prev && prev.value !== latest.value) {
      const diff = latest.value - prev.value;
      const roundedDiff = Math.round(diff * 10) / 10;
      delta = roundedDiff > 0 ? ` (+${roundedDiff} kg)` : ` (${roundedDiff} kg)`;
    }
    const latestWeight = Math.round(latest.value * 10) / 10;
    weightStats = `Latest: ${latestWeight} kg on ${latest.date}${delta}`;
    // Show recent 3 weights, rounded
    const recent = sorted.slice(0, 3);
    if (recent.length > 1) {
      weightStats += `\nRecent: ${recent.map(w => `${Math.round(w.value * 10) / 10} (${w.date.slice(5)})`).join(' · ')}`;
    }
  } else {
    weightStats = 'No weight data yet.';
  }
  weightStatsDiv.innerHTML = weightStats.replace(/\n/g, '<br>');
}

// --- Heatmap with touch support ---
let currentTooltipCell = null;

function hideTooltip() {
  tooltip.style.display = 'none';
  currentTooltipCell = null;
}

function showTooltipForCell(cell, content, event) {
  let left, top;
  if (event && event.touches) {
    const touch = event.touches[0];
    left = touch.clientX + 10;
    top = touch.clientY + 10;
  } else if (event && (event.clientX || event.clientY)) {
    left = event.clientX + 10;
    top = event.clientY + 10;
  } else {
    const rect = cell.getBoundingClientRect();
    left = rect.right + 10;
    top = rect.top;
  }
  tooltip.textContent = content;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.style.display = 'block';
  currentTooltipCell = cell;
}

function generateHeatmap(workouts, weights) {
  const container = document.getElementById('heatmap');
  container.innerHTML = '';
  const dayMap = {};
  workouts.forEach(w => {
    if (!dayMap[w.date]) dayMap[w.date] = [];
    dayMap[w.date].push(w);
  });
  let start = heatmapStart ? new Date(heatmapStart) : null;
  if (!start && workouts.length) {
    const earliest = workouts.reduce((min, w) => w.date < min ? w.date : min, today());
    start = new Date(earliest);
  }
  if (!start) {
    start = new Date();
    start.setDate(start.getDate() - 90);
  }
  const end = new Date();
  let d = new Date(start);
  while (d <= end) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'cell' + (dayMap[key] ? ' active' : '');
    cell.setAttribute('data-date', key);
    const getTooltipContent = () => {
      let txt = key;
      if (dayMap[key]) {
        const agg = {};
        dayMap[key].forEach(x => agg[x.name] = (agg[x.name] || 0) + x.value);
        Object.entries(agg).forEach(([k,v]) => txt += `\n${k} ${v}`);
      }
      if (window.weightsMap && window.weightsMap[key]) {
        const rounded = Math.round(window.weightsMap[key] * 10) / 10;
        txt += `\nwt ${rounded} kg`;
      }
      return txt;
    };
    cell.on
