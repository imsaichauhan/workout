<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#000;color:#d1d5db;font-family:monospace;max-width:720px;margin:40px auto}
#login{position:absolute;top:20px;right:20px;cursor:pointer}
input{background:none;border:none;outline:none;color:#d1d5db;font-family:inherit;width:100%}
#log{white-space:pre-wrap}
#heatmap{margin-top:24px}
.week{display:inline-block}
.cell{width:10px;height:10px;margin:2px;background:#111;display:block}
.cell.active{background:#22c55e}
#stats{margin-top:24px;white-space:pre}
#chart{margin-top:32px}
.err{color:#ef4444}
</style>
</head>
<body>

<div id="login">[login]</div>
<div id="log"></div>
<div>> <input id="cmd"></div>
<div id="heatmap"></div>
<div id="stats"></div>
<canvas id="chart" width="720" height="120"></canvas>

<script>
const SUPABASE_URL = 'https://ptlccumwheypalpvbhms.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0bGNjdW13aGV5cGFscHZiaG1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDY4MzQsImV4cCI6MjA5MDAyMjgzNH0.LkvF84QWKntY4-3YHtBvN_ygRsn4QJleFuA5pnpwsvU'
const PASSWORD = 'mubi'

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let auth = localStorage.getItem('auth') === 'true'

const loginEl = document.getElementById('login')
const logEl = document.getElementById('log')
const cmd = document.getElementById('cmd')

const map = { pu:'Push-ups', sq:'Squats', cr:'Crunches', pl:'Plank' }

let history = []
let hIndex = 0

function print(t,c){
 const line = document.createElement('div')
 if(c) line.className=c
 line.textContent = t
 logEl.appendChild(line)
 window.scrollTo(0,document.body.scrollHeight)
}

function today(){ return new Date().toISOString().slice(0,10) }

loginEl.onclick = ()=>{
 if(!auth){
  const i=document.createElement('input')
  i.type='password'
  loginEl.innerHTML=''
  loginEl.appendChild(i)
  i.focus()
  i.onkeydown=e=>{
   if(e.key==='Enter'){
    if(i.value===PASSWORD){
     auth=true
     localStorage.setItem('auth','true')
     loginEl.textContent='[logout]'
     print('logged in')
     printHelp()
     cmd.focus()
    } else {
     print('denied','err')
     loginEl.textContent='[login]'
    }
   }
  }
 } else {
  auth=false
  localStorage.removeItem('auth')
  loginEl.textContent='[login]'
 }
}

function printHelp(){
 print('commands:')
 print('w <ex> <n> [date]')
 print('wt <n> [date]')
 print('p <n> (pushups)')
 print('s <n> (squats)')
 print('exp [w|wt|all|YYYY-MM]')
 print('help')
}

async function run(input){
 if(!auth){ print('login first','err'); return }

 print('> '+input)

 const p=input.trim().split(' ')
 const cmd=p[0]

 if(cmd==='help'){ printHelp(); return }

 if(cmd==='w'){
  let ex=p[1], val=parseInt(p[2]), date=p[3]||today()
  if(!val) return print('× invalid','err')
  const name=map[ex]||ex
  await sb.from('workouts').insert([{name_raw:ex,name,value:val,date}])
  print(`+${val} ${name}`)
 }

 else if(cmd==='wt'){
  let val=parseFloat(p[1]), date=p[2]||today()
  if(!val) return print('× invalid','err')
  await sb.from('weights').insert([{value:val,date}])
  print(`${val} kg`)
 }

 else if(cmd==='p'){
  await run(`w pu ${p[1]}`)
  return
 }

 else if(cmd==='s'){
  await run(`w sq ${p[1]}`)
  return
 }

 else if(cmd==='exp'){
  await exportCSV(p[1])
 }

 else{
  print('× invalid','err')
 }

 load()
}

cmd.onkeydown = async e=>{
 if(e.key==='Enter'){
  const v=cmd.value
  history.push(v)
  hIndex=history.length
  await run(v)
  cmd.value=''
 }

 if(e.key==='ArrowUp'){
  hIndex=Math.max(0,hIndex-1)
  cmd.value=history[hIndex]||''
  e.preventDefault()
 }

 if(e.key==='ArrowDown'){
  hIndex=Math.min(history.length,hIndex+1)
  cmd.value=history[hIndex]||''
  e.preventDefault()
 }

 if(e.ctrlKey && e.key==='l'){
  logEl.innerHTML=''
  e.preventDefault()
 }
}

async function exportCSV(q){
 let workouts=[],weights=[]

 const {data:w}=await sb.from('workouts').select('name,value,date').order('date',{ascending:true})
 const {data:wt}=await sb.from('weights').select('value,date').order('date',{ascending:true})

 workouts=w||[]
 weights=wt||[]

 if(q && /^\d{4}-\d{2}$/.test(q)){
  workouts=workouts.filter(r=>r.date.startsWith(q))
  weights=weights.filter(r=>r.date.startsWith(q))
 }

 if(q==='wt'){
  let csv='value,date\n'
  weights.forEach(r=>csv+=`${r.value},${r.date}\n`)
  download(csv,'weights.csv')
 }
 else if(q==='w' || !q){
  let csv='name,value,date\n'
  workouts.forEach(r=>csv+=`${r.name},${r.value},${r.date}\n`)
  download(csv,'workouts.csv')
 }
 else{
  let csv='type,name,value,date\n'
  workouts.forEach(r=>csv+=`workout,${r.name},${r.value},${r.date}\n`)
  weights.forEach(r=>csv+=`weight,,${r.value},${r.date}\n`)
  download(csv,'all.csv')
 }

 print('exported')
}

function download(csv,name){
 const blob=new Blob([csv])
 const a=document.createElement('a')
 a.href=URL.createObjectURL(blob)
 a.download=name
 a.click()
}

function group(data){
 const g={}
 data.forEach(r=>{
  if(!g[r.name]) g[r.name]={}
  if(!g[r.name][r.date]) g[r.name][r.date]=0
  g[r.name][r.date]+=r.value
 })
 return g
}

function stats(data){
 const g=group(data), t=today()
 let out=''
 Object.keys(g).forEach(name=>{
  const todayVal=g[name][t]||'—'
  const best=Math.max(...Object.values(g[name]))
  out+=`${name} ${todayVal} (best:${best})\n`
 })
 document.getElementById('stats').textContent=out
}

function heatmap(data){
 const div=document.getElementById('heatmap')
 div.innerHTML=''
 const days={}
 data.forEach(r=>days[r.date]=true)

 let d=new Date('2026-03-24'), end=new Date()
 while(d<=end){
  const el=document.createElement('div')
  el.className='cell'+(days[d.toISOString().slice(0,10)]?' active':'')
  div.appendChild(el)
  d.setDate(d.getDate()+1)
 }
}

function processWeights(weights){
 const map={}
 weights.forEach(w=>map[w.date]=w) // latest wins
 return Object.values(map)
}

function chart(weights){
 weights=processWeights(weights)

 const c=document.getElementById('chart')
 const ctx=c.getContext('2d')
 ctx.clearRect(0,0,c.width,c.height)

 if(weights.length<2) return

 weights.sort((a,b)=>new Date(a.date)-new Date(b.date))

 const vals=weights.map(w=>w.value)
 const min=Math.min(...vals), max=Math.max(...vals)

 ctx.beginPath()
 weights.forEach((w,i)=>{
  const x=i*(c.width/(weights.length-1))
  const y=c.height-((w.value-min)/(max-min))*c.height
  if(i===0) ctx.moveTo(x,y)
  else ctx.lineTo(x,y)
 })

 ctx.strokeStyle='#60a5fa'
 ctx.stroke()
}

async function load(){
 const {data}=await sb.from('workouts').select('name,value,date')
 const {data:weights}=await sb.from('weights').select('value,date')

 stats(data||[])
 heatmap(data||[])
 chart(weights||[])
}

cmd.focus()
load()
</script>
</body>
</html>
