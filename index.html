<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>workout tracker</title>

<script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
<style>
* {
  box-sizing: border-box;
}
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
body {
  background: #000;
  color: #d1d5db;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
  padding: 12px;
}
.dashboard {
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  margin: 0 0 16px 0;
  padding: 12px;
  font-family: monospace;
  font-size: 13px;
  flex-shrink: 0;
}
.dashboard-section {
  margin-bottom: 16px;
}
.dashboard-section:last-child {
  margin-bottom: 0;
}
.dashboard-label {
  color: #22c55e;
  font-weight: bold;
  border-bottom: 1px dashed #2a2a2a;
  padding-bottom: 2px;
  margin-bottom: 6px;
  display: inline-block;
  width: 100%;
}
.dashboard-content {
  white-space: pre-wrap;
  font-family: monospace;
}
#today-stats, #exercise-stats, #weight-stats {
  margin: 0;
  white-space: pre-wrap;
}
#heatmap {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 4px;
  vertical-align: middle;
}
.cell {
  width: min(10px, 3vw);
  height: min(10px, 3vw);
  background: #1a1a1a;
  border-radius: 1px;
  transition: background 0.1s, transform 0.05s;
  display: inline-block;
  cursor: pointer;
}
.cell.active { background: #22c55e; }
.cell:active {
  transform: scale(0.95);
}
#terminal {
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}
#log {
  white-space: pre-wrap;
  overflow-y: auto;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.4;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #2a2a2a #0a0a0a;
}
#log::-webkit-scrollbar {
  width: 6px;
}
#log::-webkit-scrollbar-track {
  background: #0a0a0a;
}
#log::-webkit-scrollbar-thumb {
  background: #2a2a2a;
  border-radius: 3px;
}
#log::-webkit-scrollbar-thumb:hover {
  background: #22c55e;
}
#line {
  display: flex;
  align-items: center;
  gap: 6px;
  border-top: 1px solid #2a2a2a;
  padding-top: 8px;
  margin-top: 4px;
  flex-shrink: 0;
}
#prompt {
  font-weight: bold;
  color: #22c55e;
}
input {
  background: none;
  border: none;
  outline: none;
  color: #d1d5db;
  font-family: inherit;
  flex: 1;
  font-size: 13px;
  padding: 4px 0;
}
.err { color: #ef4444; }
.success { color: #22c55e; }
.info { color: #facc15; }
.tooltip {
  position: absolute;
  background: #000;
  border: 1px solid #22c55e;
  padding: 8px 12px;
  font-size: 12px;
  white-space: pre;
  z-index: 100;
  border-radius: 4px;
  pointer-events: auto;
  max-width: 80vw;
  word-wrap: break-word;
}
#loading {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #000;
  border: 1px solid #22c55e;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 4px;
  display: none;
  font-family: monospace;
}
/* Mobile improvements */
@media (max-width: 600px) {
  body {
    padding: 8px;
  }
  .dashboard {
    padding: 16px;
    font-size: 15px;
  }
  .dashboard-label {
    font-size: 16px;
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  .dashboard-content {
    font-size: 14px;
  }
  .cell {
    width: min(14px, 4vw);
    height: min(14px, 4vw);
  }
  #heatmap {
    gap: 6px; /* increased spacing on mobile */
  }
  #log {
    font-size: 15px;
  }
  #prompt {
    font-size: 15px;
  }
  input {
    font-size: 15px;
  }
  .tooltip {
    font-size: 14px;
    padding: 10px 14px;
  }
}
</style>
</head>

function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function validDate(d) { return /^\d{4}-\d{2}-\d{2}$/.test(d); }
function isFutureDate(dateStr) { return dateStr > today(); }

function parseDuration(value) {
  const str = String(value).trim();
  if (str.endsWith('s')) {
    const num = parseInt(str.slice(0, -1), 10);
    if (!isNaN(num)) return num;
  }
  if (str.includes(':')) {
    const parts = str.split(':');
    if (parts.length === 2) {
      const mins = parseInt(parts[0], 10);
      const secs = parseInt(parts[1], 10);
      if (!isNaN(mins) && !isNaN(secs)) return mins * 60 + secs;
    }
  }
  return null;
}

function formatDuration(seconds) {
  if (seconds < 60) return `${seconds}s`;
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return secs ? `${mins}m ${secs}s` : `${mins}m`;
}

// Helper to strip local id from payload before sending to Supabase
function sanitizePayload(payload) {
  const copy = { ...payload };
  delete copy.id;
  delete copy.timestamp;
  return copy;
}

// --- Sync helpers with proper error checking ---
async function pullFromSupabase(abortSignal) {
  if (!isOnline()) return false;
  setLoading(true);
  try {
    const [workoutsRes, weightsRes] = await Promise.all([
      sb.from('workouts').select('*'),
      sb.from('weights').select('*')
    ]);
    if (abortSignal?.aborted) throw new Error('Aborted');
    if (workoutsRes.error) throw new Error(`Workouts pull: ${workoutsRes.error.message}`);
    if (weightsRes.error) throw new Error(`Weights pull: ${weightsRes.error.message}`);
    
    // Aggregate workouts by name+date to match our local storage model (one entry per name+date)
    const aggregatedWorkouts = {};
    (workoutsRes.data || []).forEach(w => {
      const key = `${w.name}|${w.date}`;
      if (!aggregatedWorkouts[key]) {
        aggregatedWorkouts[key] = { name_raw: w.name_raw, name: w.name, date: w.date, value: 0 };
      }
      aggregatedWorkouts[key].value += w.value;
    });
    const workoutsToStore = Object.values(aggregatedWorkouts);
    
    await db.workouts.clear();
    if (workoutsToStore.length) await db.workouts.bulkAdd(workoutsToStore);
    await db.weights.clear();
    if (weightsRes.data) await db.weights.bulkAdd(weightsRes.data);
    return true;
  } catch(e) {
    if (e.message !== 'Aborted') print(`Pull error: ${e.message}`, 'err');
    return false;
  } finally {
    setLoading(false);
  }
}

async function pushPendingOps(abortSignal) {
  if (!isOnline()) return true;
  setLoading(true);
  let allSucceeded = true;
  try {
    const pending = await db.pendingOps.toArray();
    for (const op of pending) {
      if (abortSignal?.aborted) throw new Error('Aborted');
      try {
        const safePayload = sanitizePayload(op.payload);
        let result;
        if (op.type === 'insert_workout') {
          result = await sb.from('workouts').insert(safePayload);
        } else if (op.type === 'delete_workout') {
          result = await sb.from('workouts').delete().match(safePayload);
        } else if (op.type === 'insert_weight') {
          result = await sb.from('weights').insert(safePayload);
        } else if (op.type === 'delete_weight') {
          result = await sb.from('weights').delete().match(safePayload);
        } else {
          continue;
        }
        if (result.error) {
          print(`Failed to sync operation: ${result.error.message}`, 'err');
          print(`  ${op.type}: ${JSON.stringify(safePayload).slice(0, 100)}`, 'info');
          allSucceeded = false;
        } else {
          await db.pendingOps.delete(op.id);
        }
      } catch(e) {
        print(`Sync operation threw: ${e.message}`, 'err');
        allSucceeded = false;
      }
    }
  } catch(e) {
    if (e.message !== 'Aborted') print(`Push error: ${e.message}`, 'err');
    allSucceeded = false;
  } finally {
    setLoading(false);
  }
  return allSucceeded;
}

async function syncToSupabase(type, payload, silent = false) {
  const safePayload = sanitizePayload(payload);
  if (!isOnline()) {
    await db.pendingOps.add({ type, payload: safePayload, timestamp: Date.now() });
    if (!silent) print(`[queued] ${JSON.stringify(safePayload).slice(0, 60)}`, 'info');
    return false;
  }
  try {
    let result;
    if (type === 'insert_workout') {
      result = await sb.from('workouts').insert(safePayload);
    } else if (type === 'delete_workout') {
      result = await sb.from('workouts').delete().match(safePayload);
    } else if (type === 'insert_weight') {
      result = await sb.from('weights').insert(safePayload);
    } else if (type === 'delete_weight') {
      result = await sb.from('weights').delete().match(safePayload);
    } else {
      return false;
    }
    if (result.error) {
      print(`Supabase error: ${result.error.message}`, 'err');
      await db.pendingOps.add({ type, payload: safePayload, timestamp: Date.now() });
      return false;
    }
    return true;
  } catch(e) {
    print(`Supabase exception: ${e.message}`, 'err');
    await db.pendingOps.add({ type, payload: safePayload, timestamp: Date.now() });
    return false;
  }
}

// --- Safe push (only for authenticated users) ---
async function performPush(abortSignal, silent = false) {

// --- Core data operations (using upsert via delete+add for workouts) ---
async function storeWorkout(ex, val, date, append = false, skipConfirm = false) {
  if (!auth) throw new Error('Not authenticated');
  const name = map[ex] || ex;
  const existing = await db.workouts.where({ name, date }).first();
  const existingValue = existing ? existing.value : null;
  
  if (!append && existing && !skipConfirm) {
    throw { needConfirm: true, message: `Overwrite ${name} on ${date} (current ${existingValue}) with ${val}? (y/n)`, type: 'overwrite', data: { ex, val, date, name, existingValue, append: false } };
  }
  
  let newVal = val;
  if (append && existing) {
    newVal = existing.value + val;
  }
  const entry = { name_raw: ex, name, value: newVal, date };
  // Delete existing entry for this name+date (if any)
  if (existing) {
    await db.workouts.where({ name, date }).delete();
  }
  await db.workouts.add(entry);
  const synced = await syncToSupabase('insert_workout', entry);
  return { synced, entry, replaced: !append && !!existing, existingValue, appended: append && !!existing };
}

async function storeWeight(val, date, skipConfirm = false) {
  if (!auth) throw new Error('Not authenticated');
  const existing = await db.weights.get(date);
  const existingValue = existing ? existing.value : null;
  
  if (existing && !skipConfirm) {
    throw { needConfirm: true, message: `Overwrite weight on ${date} (current ${existingValue}) with ${val} kg? (y/n)`, type: 'overwrite_weight', data: { val, date, existingValue } };
  }
  
  await db.weights.put({ date, value: val });
  const synced = await syncToSupabase('insert_weight', { value: val, date });
  return { synced, replaced: !!existing, existingValue };
}

// --- UI refresh ---
async function loadFromLocal() {
  const workouts = await db.workouts.toArray();
  const weights = await db.weights.toArray();
  const sortedWeights = weights.sort((a,b) => new Date(b.date) - new Date(a.date));
  updateDashboard(workouts, sortedWeights);
  generateHeatmap(workouts, weights);
  window.weightsMap = {};
  weights.forEach(w => window.weightsMap[w.date] = w.value);
}

function updateDashboard(workouts, weights) {
  const t = today();
  // Aggregate per exercise (sum per day) – but our store already has one entry per name+date, so just sum by date (though not needed)
  const perEx = {};
  workouts.forEach(w => {
    if (!perEx[w.name]) perEx[w.name] = {};
    if (!perEx[w.name][w.date]) perEx[w.name][w.date] = 0;
    perEx[w.name][w.date] += w.value;
  });
  // Today's stats
  let todayStr = '';
  Object.keys(perEx).forEach(name => {
    const todayVal = perEx[name][t] || '—';
    if (todayVal !== '—') {
      todayStr += `${name}: ${todayVal}\n`;
    }
  });
  if (todayStr === '') todayStr = 'No activity logged today.\n';
  // Add today's weight
  const todayWeight = weights.find(w => w.date === t);
  if (todayWeight) {
    const roundedWeight = Math.round(todayWeight.value * 10) / 10;
    todayStr += `Weight: ${roundedWeight} kg\n`;
  }
  todayStatsDiv.innerHTML = todayStr.replace(/\n/g, '<br>');

  // Exercise stats (best, last)
  let exStats = '';
  Object.keys(perEx).forEach(name => {
    const dates = Object.keys(perEx[name]).sort().reverse();
    const best = Math.max(...Object.values(perEx[name]));
    const lastDate = dates.find(d => d !== t);
    const lastVal = lastDate ? perEx[name][lastDate] : null;
    exStats += `${name}: best ${best}${lastVal ? `, last ${lastVal}` : ''}\n`;
  });
  exerciseStatsDiv.innerHTML = exStats.replace(/\n/g, '<br>');

  // Weight stats with delta (rounded to 1 decimal)
  let weightStats = '';
  if (weights.length) {
    const sorted = weights.sort((a,b) => new Date(b.date) - new Date(a.date));
    const latest = sorted[0];
    const prev = sorted[1];
    let delta = '';
    if (prev && prev.value !== latest.value) {
      const diff = latest.value - prev.value;
      const roundedDiff = Math.round(diff * 10) / 10;
      delta = roundedDiff > 0 ? ` (+${roundedDiff} kg)` : ` (${roundedDiff} kg)`;
    }
    const latestWeight = Math.round(latest.value * 10) / 10;
    weightStats = `Latest: ${latestWeight} kg on ${latest.date}${delta}`;
    // Show recent 3 weights, rounded
    const recent = sorted.slice(0, 3);
    if (recent.length > 1) {
      weightStats += `\nRecent: ${recent.map(w => `${Math.round(w.value * 10) / 10} (${w.date.slice(5)})`).join(' · ')}`;
    }
  } else {
    weightStats = 'No weight data yet.';
  }
  weightStatsDiv.innerHTML = weightStats.replace(/\n/g, '<br>');
}

// --- Heatmap with touch support ---
let currentTooltipCell = null;

function hideTooltip() {
  tooltip.style.display = 'none';
  currentTooltipCell = null;
}

function showTooltipForCell(cell, content, event) {
  let left, top;
  if (event && event.touches) {
    const touch = event.touches[0];
    left = touch.clientX + 10;
    top = touch.clientY + 10;
  } else if (event && (event.clientX || event.clientY)) {
    left = event.clientX + 10;
    top = event.clientY + 10;
  } else {
    const rect = cell.getBoundingClientRect();
    left = rect.right + 10;
    top = rect.top;
  }
  tooltip.textContent = content;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.style.display = 'block';
  currentTooltipCell = cell;
}

function generateHeatmap(workouts, weights) {
  const container = document.getElementById('heatmap');
  container.innerHTML = '';
  const dayMap = {};
  workouts.forEach(w => {
    if (!dayMap[w.date]) dayMap[w.date] = [];
    dayMap[w.date].push(w);
  });
  let start = heatmapStart ? new Date(heatmapStart) : null;
  if (!start && workouts.length) {
    const earliest = workouts.reduce((min, w) => w.date < min ? w.date : min, today());
    start = new Date(earliest);
  }
  if (!start) {
    start = new Date();
    start.setDate(start.getDate() - 90);
  }
  const end = new Date();
  let d = new Date(start);
  while (d <= end) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'cell' + (dayMap[key] ? ' active' : '');
    cell.setAttribute('data-date', key);
    const getTooltipContent = () => {
      let txt = key;
      if (dayMap[key]) {
        const agg = {};
        dayMap[key].forEach(x => agg[x.name] = (agg[x.name] || 0) + x.value);
        Object.entries(agg).forEach(([k,v]) => txt += `\n${k} ${v}`);
      }
      if (window.weightsMap && window.weightsMap[key]) {
        const rounded = Math.round(window.weightsMap[key] * 10) / 10;
        txt += `\nwt ${rounded} kg`;
      }
      return txt;
    };
    cell.onmouseenter = (e) => { showTooltipForCell(cell, getTooltipContent(), e); };
    cell.onmouseleave = () => { hideTooltip(); };
    cell.onclick = (e) => {
      e.stopPropagation();
      if (currentTooltipCell === cell && tooltip.style.display === 'block') {
        hideTooltip();
      } else {
        showTooltipForCell(cell, getTooltipContent(), e);
      }
    };
    container.appendChild(cell);
    d.setDate(d.getDate() + 1);
  }
}

// Global click/tap handler to hide tooltip when clicking outside
document.body.addEventListener('click', (e) => {
  if (!e.target.closest('.cell') && !tooltip.contains(e.target)) hideTooltip();
});
document.body.addEventListener('touchstart', (e) => {
  if (!e.target.closest('.cell') && !tooltip.contains(e.target)) hideTooltip();
});

// --- Command handlers (read-only, allowed for guests) ---
async function listWorkout(args) {
  const { from, to } = parseDateRange(args);
  let query = db.workouts.orderBy('date').reverse();
  if (from) query = query.filter(w => w.date >= from);
  if (to) query = query.filter(w => w.date <= to);
  const results = await query.toArray();
  if (!results.length) { print('No workouts found.'); return; }
  // Group by date to show aggregated values (though our store already has one per name+date)
  const grouped = {};
  results.forEach(w => {
    if (!grouped[w.date]) grouped[w.date] = {};
    grouped[w.date][w.name] = (grouped[w.date][w.name] || 0) + w.value;
  });
  print('--- workouts ---');
  for (const date in grouped) {
    const entries = Object.entries(grouped[date]).map(([name, val]) => `${name}: ${val}`).join(', ');
    print(`${date} | ${entries}`);
  }
}

async function listWeight(args) {
  const { from, to } = parseDateRange(args);
  let query = db.weights.orderBy('date').reverse();
  if (from) query = query.filter(w => w.date >= from);
  if (to) query = query.filter(w => w.date <= to);
  const results = await query.toArray();
  if (!results.length) { print('No weight entries.'); return; }
  print('--- weights ---');
  results.forEach(w => {
    const rounded = Math.round(w.value * 10) / 10;
    print(`${w.date}: ${rounded} kg`);
  });
}

async function cmdStats() {
  const workouts = await db.workouts.toArray();
  const weights = await db.weights.toArray();
  if (!workouts.length) { print('No workout data yet', 'err'); return; }

  // Aggregate per exercise and date to get daily totals (already aggregated, but we sum just in case)
  const dailyTotals = {};
  workouts.forEach(w => {
    if (!dailyTotals[w.name]) dailyTotals[w.name] = {};
    if (!dailyTotals[w.name][w.date]) dailyTotals[w.name][w.date] = 0;
    dailyTotals[w.name][w.date] += w.value;
  });

  const perEx = {};
  for (const [name, dates] of Object.entries(dailyTotals)) {
    const values = Object.values(dates);
    const total = values.reduce((a,b) => a + b, 0);
    const best = Math.max(...values);
    const days = values.length;
    const avg = total / days;
    // Last 7 days total
    const sevenDaysAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0,10);
    const weekTotal = Object.entries(dates)
      .filter(([date]) => date >= sevenDaysAgo)
      .reduce((sum, [, val]) => sum + val, 0);
    perEx[name] = { total, best, avg, weekTotal };
  }

  print('--- detailed stats ---');
  for (const [ex, data] of Object.entries(perEx)) {
    const avgFormatted = typeof data.avg === 'number' ? data.avg.toFixed(1) : data.avg;
    print(`${ex}: total ${data.total} | best ${data.best} | avg ${avgFormatted} | last 7d ${data.weekTotal}`);
  }
  if (weights.length) {
    const lastWeight = weights[weights.length-1].value;
    const bestWeight = Math.max(...weights.map(w=>w.value));
    print(`\nweight: latest ${Math.round(lastWeight*10)/10} kg | best ${Math.round(bestWeight*10)/10} kg`);
  }
}

async function cmdExportCSV() {
  const workouts = await db.workouts.toArray();
  const weights = await db.weights.toArray();
  const workoutRows = workouts.map(w => `${w.date},${w.name},${w.value}`);
  const weightRows = weights.map(w => `${w.date},weight,${w.value}`);
  const csv = ['date,type,value', ...workoutRows, ...weightRows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tracker_${today()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  print('CSV exported successfully', 'success');
}

// --- Autocomplete ---
function updateAutocompleteSuggestions(input) {
  const words = input.split(' ');
  const lastWord = words[words.length-1];
  if (!lastWord) return [];
  const allCommands = ['w', 'wt', 'list', 'delete', 'edit', 'add-ex', 'heatmap-start', 'stats', 'export', 'clear', 'help', 'tutorial', 'login', 'logout', 'push', 'pull', 'resync', 'pending', 'plan', 'exercises'];
  const types = ['workout', 'weight'];
  let suggestions = [];
  if (words.length === 1) suggestions = allCommands.filter(c => c.startsWith(lastWord));
  else if (words[0] === 'list' && words.length === 2) suggestions = types.filter(t => t.startsWith(lastWord));
  else if (words[0] === 'delete' && words.length === 2) suggestions = types.filter(t => t.startsWith(lastWord));
  else if (words[0] === 'edit' && words.length === 2) suggestions = types.filter(t => t.startsWith(lastWord));
  else if ((words[0] === 'edit' && words[1] === 'workout') && words.length === 3) suggestions = Object.keys(map).filter(e => e.startsWith(lastWord));
  else if (words[0] === 'w' && words.length === 2) suggestions = Object.keys(map).filter(e => e.startsWith(lastWord));
  return suggestions;
}

// --- Keyboard handling ---
cmd.addEventListener('keydown', async (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const input = cmd.value;
    const suggestions = updateAutocompleteSuggestions(input);
    if (suggestions.length === 1) {
      const words = input.split(' ');
      words[words.length-1] = suggestions[0];
      cmd.value = words.join(' ');
    } else if (suggestions.length > 1) {
      print(`Possible: ${suggestions.join(', ')}`, 'info');
    }
    return;
  }
  if (e.key === 'Enter') {
    const v = cmd.value;
    if (v.trim()) {
      // Don't add to history if we're waiting for a password
      if (!awaitingPassword) {
        history.push(v);
        localStorage.setItem('cmdHistory', JSON.stringify(history.slice(-100)));
        hIndex = history.length;
      }
    }
    await run(v);
    cmd.value = '';
    return;
  }
  if (e.key === 'ArrowUp') {
    if (history.length) {
      hIndex = Math.max(0, hIndex-1);
      cmd.value = history[hIndex] || '';
      e.preventDefault();
    }
  }
  if (e.key === 'ArrowDown') {
    hIndex = Math.min(history.length, hIndex+1);
    cmd.value = history[hIndex] || '';
    e.preventDefault();
  }
  if (e.ctrlKey && e.key === 'l') {
    logEl.innerHTML = '';
    e.preventDefault();
  }
  if (e.ctrlKey && e.key === 'c') {
    if (currentAbortController) {
      currentAbortController.abort();
      print('Operation cancelled', 'info');
      currentAbortController = null;
    }
    e.preventDefault();
  }
});

// --- Main command dispatcher ---
async function run(input) {
  if (awaitingPassword) {
    if (input === PASSWORD) {
      auth = true;
      localStorage.setItem('auth', 'true');
      print('Logged in', 'success');
      updatePrompt();
      await pushPendingOps();  // any queued changes from offline
      await pullFromSupabase();
      await loadFromLocal();
    } else {
      print('Denied', 'err');
      updatePrompt();
    }
    awaitingPassword = false;
    cmd.type = 'text';
    return;
  }

  if (awaitingConfirmation) {
    const response = input.trim().toLowerCase();
    if (response === 'y' || response === 'yes') {
      if (confirmationCallback) await confirmationCallback(...confirmationArgs);
    } else {
      print('Cancelled', 'info');
    }
    awaitingConfirmation = false;
    confirmationCallback = null;
    confirmationArgs = null;
    return;
  }

  print('> ' + input);

  const parts = input.trim().split(' ');
  const cmdName = parts[0];
  const args = parts.slice(1);

  // Set of all known commands (case-insensitive)
  const allKnownCommands = new Set([
    'login', 'logout', 'help', 'clear', 'tutorial', 
    'list', 'stats', 'export', 'heatmap-start', 'pull', 
    'push', 'resync', 'pending', 'delete', 'edit', 'add-ex', 
    'w', 'wt', 'plan', 'exercises'
  ]);

  if (!allKnownCommands.has(cmdName)) {
    print('Unknown command – type help', 'err');
    return;
  }

  // auth-free commands
  if (cmdName === 'login') {
    if (auth) {
      print('Already logged in.', 'info');
    } else {
      awaitingPassword = true;
      cmd.type = 'password';
      cmd.value = '';
      setPrompt('password>');
    }
    return;
  }
  if (cmdName === 'logout') {
    auth = false;
    localStorage.removeItem('auth');
    updatePrompt();
    print('Logged out', 'info');
    return;
  }
  if (cmdName === 'help') {
    if (!auth) {
      print(`
--- GUEST COMMANDS (always available) ---
  list workout|weight [--from YYYY-MM-DD] [--to YYYY-MM-DD]
  stats, export, heatmap-start YYYY-MM-DD
  pull, clear, help, tutorial, plan, exercises

Tip: Press Tab to autocomplete commands and exercise names.

Login with 'login' to enable additional commands: w, wt, delete, edit, add-ex, push, resync, pending, logout
`);
    } else {
      print(`
--- GUEST COMMANDS (always available) ---
  list workout|weight [--from YYYY-MM-DD] [--to YYYY-MM-DD]
  stats, export, heatmap-start YYYY-MM-DD
  pull, clear, help, tutorial, plan, exercises

Tip: Press Tab to autocomplete commands and exercise names.

--- LOGGED-IN COMMANDS (additional) ---
  w <ex> <n> [+<append>] [date]
  wt <n> [date]
  delete workout|weight YYYY-MM-DD
  edit workout|weight ...  (confirmation required)
  add-ex <shortcode> <fullname>
  push, resync, pending
  logout
`);
    }
    return;
  }
  if (cmdName === 'clear') { logEl.innerHTML = ''; return; }
  if (cmdName === 'tutorial') { tutorial(); return; }
  if (cmdName === 'plan') { workoutPlan(); return; }
  if (cmdName === 'exercises') { listExercises(); return; }

  // read-only commands (allowed for guests)
  if (cmdName === 'list') {
    const type = args[0];
    if (type === 'workout') await listWorkout(args.slice(1));
    else if (type === 'weight') await listWeight(args.slice(1));
    else print('Usage: list workout|weight [--from date] [--to date]', 'err');
    return;
  }
  if (cmdName === 'stats') { await cmdStats(); return; }
  if (cmdName === 'export') { await cmdExportCSV(); return; }
  if (cmdName === 'heatmap-start') {
    await setHeatmapStart(args[0]);
    return;
  }
  if (cmdName === 'pull') {
    if (currentAbortController) currentAbortController.abort();
    currentAbortController = new AbortController();
    await performPull(currentAbortController.signal);
    currentAbortController = null;
    return;
  }
  if (cmdName === 'push') {
    if (currentAbortController) currentAbortController.abort();
    currentAbortController = new AbortController();
    await performPush(currentAbortController.signal, false);
    currentAbortController = null;
    return;
  }
  if (cmdName === 'resync') {
    confirmResync();
    return;
  }
  if (cmdName === 'pending') {
    await listPending();
    return;
  }

  // All commands below require authentication
  if (!auth) {
    print('Login required (type login)', 'err');
    return;
  }

  // editing commands (require auth)
  if (cmdName === 'delete') {
    const type = args[0];
    const date = args[1];
    if (type === 'workout') confirmDeleteWorkout(date);
    else if (type === 'weight') confirmDeleteWeight(date);
    else print('Usage: delete workout|weight YYYY-MM-DD', 'err');
    return;
  }
  if (cmdName === 'edit') {
    const type = args[0];
    if (type === 'workout') {
      const ex = args[1];
      const newVal = args[2];
      const date = args[3];
      if (!ex || !newVal) { print('Usage: edit workout <ex> <new> [date]', 'err'); return; }
      const name = map[ex] || ex;
      const targetDate = date || today();
      const existing = await db.workouts.where({ name, date: targetDate }).first();
      if (!existing) {
        const val = parseFloat(newVal);
        if (isNaN(val) || val <= 0) { print('Value must be a positive number', 'err'); return; }
        if (isFutureDate(targetDate)) { print('Cannot edit future dates', 'err'); return; }
        await db.workouts.add({ name_raw: ex, name, value: val, date: targetDate });
        await syncToSupabase('insert_workout', { name_raw: ex, name, value: val, date: targetDate });
        print(`Created ${name} on ${targetDate} with ${val}`, 'success');
        await loadFromLocal();
      } else {
        confirmEditWorkout(ex, newVal, date);
      }
    } else if (type === 'weight') {
      const newVal = args[1];
      const date = args[2];
      if (!newVal) { print('Usage: edit weight <new> [date]', 'err'); return; }
      const targetDate = date || today();
      const existing = await db.weights.get(targetDate);
      if (!existing) {
        const val = parseFloat(newVal);
        if (isNaN(val) || val <= 0) { print('Weight must be a positive number', 'err'); return; }
        if (isFutureDate(targetDate)) { print('Cannot edit future dates', 'err'); return; }
        await db.weights.put({ date: targetDate, value: val });
        await syncToSupabase('insert_weight', { value: val, date: targetDate });
        print(`Created weight ${val} kg on ${targetDate}`, 'success');
        await loadFromLocal();
      } else {
        confirmEditWeight(newVal, date);
      }
    } else {
      print('Usage: edit workout|weight ...', 'err');
    }
    return;
  }
  if (cmdName === 'add-ex') {
    const short = args[0];
    const full = args.slice(1).join(' ');
    if (!short || !full) { print('usage: add-ex <shortcode> <fullname>', 'err'); return; }
    if (defaultMap[short]) { print(`'${short}' is a built‑in exercise and cannot be overridden`, 'err'); return; }
    customExercises[short] = full;
    localStorage.setItem('customExercises', JSON.stringify(customExercises));
    map[short] = full;
    print(`Added exercise: ${short} -> ${full}`, 'success');
    await loadFromLocal();
    return;
  }
  if (cmdName === 'w') {
    let ex = args[0];
    let raw = args[1];
    let append = false;
    if (raw === '+') { append = true; raw = args[2]; }
    else if (raw && raw.startsWith('+')) { append = true; raw = raw.slice(1); }

    let val = parseInt(raw);
    if (isNaN(val) && raw) {
      const durationSec = parseDuration(raw);
      if (durationSec !== null) val = durationSec;
    }
    if (isNaN(val) || val <= 0) { print('Value must be a positive number or duration like 60s / 1:30', 'err'); return; }

    let dateIndex = (append && args[1]==='+') ? 3 : 2;
    let date = args[dateIndex] || today();
    if (!validDate(date)) { print('Invalid date format', 'err'); return; }
    if (isFutureDate(date)) { print('Cannot log future dates', 'err'); return; }

    try {
      const { synced, replaced, existingValue, entry, appended } = await storeWorkout(ex, val, date, append);
      const name = map[ex] || ex;
      const suffix = (ex === 'pl' || raw.includes(':') || raw.endsWith('s')) ? ` (${formatDuration(entry.value)})` : '';
      let msg = '';
      if (appended) {
        msg = `Appended ${val} ${name} to ${date} (total ${entry.value})`;
      } else if (replaced) {
        msg = `Replaced ${name} on ${date}: ${existingValue} → ${entry.value}${suffix}`;
      } else {
        msg = `Logged ${entry.value} ${name} for ${date}${suffix}`;
      }
      if (synced) {
        print(msg, 'success');
      } else {
        print(`[queued] ${msg} (offline, will push later)`, 'info');
      }
      await loadFromLocal();
    } catch (err) {
      if (err.needConfirm) {
        print(err.message, 'info');
        awaitingConfirmation = true;
        confirmationCallback = async (confirm) => {
          if (confirm) {
            try {
              const result = await storeWorkout(err.data.ex, err.data.val, err.data.date, err.data.append, true);
              const suffix = (err.data.ex === 'pl' || raw.includes(':') || raw.endsWith('s')) ? ` (${formatDuration(result.entry.value)})` : '';
              if (result.synced) {
                print(`Overwritten ${result.entry.name} on ${result.entry.date}: ${result.existingValue} → ${result.entry.value}${suffix}`, 'success');
              } else {
                print(`[queued] Overwritten ${result.entry.name} on ${result.entry.date}: ${result.existingValue} → ${result.entry.value}${suffix} (offline, will push later)`, 'info');
              }
              await loadFromLocal();
            } catch(e) {
              print(`Error: ${e.message}`, 'err');
            }
          } else {
            print('Cancelled', 'info');
          }
          awaitingConfirmation = false;
          confirmationCallback = null;
          confirmationArgs = null;
        };
        confirmationArgs = [true];
      } else {
        print(`Error: ${err.message}`, 'err');
      }
    }
    return;
  }
  if (cmdName === 'wt') {
    let val = parseFloat(args[0]);
    let date = args[1] || today();
    if (isNaN(val) || val <= 0) { print('Weight must be a positive number', 'err'); return; }
    if (!validDate(date)) { print('Invalid date format', 'err'); return; }
    if (isFutureDate(date)) { print('Cannot log future dates', 'err'); return; }
    try {
      const { synced, replaced, existingValue } = await storeWeight(val, date);
      let msg = '';
      if (replaced) {
        const diff = val - existingValue;
        const delta = diff !== 0 ? (diff > 0 ? ` (+${Math.round(diff*10)/10} kg)` : ` (${Math.round(diff*10)/10} kg)`) : '';
        msg = `Updated weight on ${date}: ${Math.round(existingValue*10)/10} → ${Math.round(val*10)/10} kg${delta}`;
      } else {
        msg = `Logged weight ${Math.round(val*10)/10} kg for ${date}`;
      }
      if (synced) {
        print(msg, 'success');
      } else {
        print(`[queued] ${msg} (offline, will push later)`, 'info');
      }
      await loadFromLocal();
    } catch (err) {
      if (err.needConfirm) {
        print(err.message, 'info');
        awaitingConfirmation = true;
        confirmationCallback = async (confirm) => {
          if (confirm) {
            try {
              const result = await storeWeight(err.data.val, err.data.date, true);
              if (result.synced) {
                print(`Overwritten weight on ${err.data.date}: ${Math.round(err.data.existingValue*10)/10} → ${Math.round(err.data.val*10)/10} kg`, 'success');
              } else {
                print(`[queued] Overwritten weight on ${err.data.date}: ${Math.round(err.data.existingValue*10)/10} → ${Math.round(err.data.val*10)/10} kg (offline, will push later)`, 'info');
              }
              await loadFromLocal();
            } catch(e) {
              print(`Error: ${e.message}`, 'err');
            }
          } else {
            print('Cancelled', 'info');
          }
          awaitingConfirmation = false;
          confirmationCallback = null;
          confirmationArgs = null;
        };
        confirmationArgs = [true];
      } else {
        print(`Error: ${err.message}`, 'err');
      }
    }
    return;
  }

  print('Unknown command – type help', 'err');
}

function parseDateRange(args) {
  let from = null, to = null;
  for (let i=0; i<args.length; i++) {
    if (args[i] === '--from' && args[i+1]) { from = args[i+1]; i++; }
    else if (args[i] === '--to' && args[i+1]) { to = args[i+1]; i++; }
  }
  return { from, to };
}

// --- Initialisation ---
window.addEventListener('load', async () => {
  updatePrompt();
  cmd.focus();
  await pullFromSupabase();
  await loadFromLocal();

  if (!auth) {
    print("Type 'help' to see available commands.", 'info');
  }

  setInterval(async () => {
    if (auth && isOnline()) {
      await performPush(null, true);
    }
  }, 30000);

  window.addEventListener('online', async () => {
    updatePrompt();
    if (auth) {
      await performPush(null, false);
      print('Back online – synced', 'info');
    } else {
      await pullFromSupabase();
      print('Back online – dashboard updated', 'info');
    }
    await loadFromLocal();
  });

  window.addEventListener('offline', () => {
    updatePrompt();
    print('You are offline – changes will be queued', 'info');
  });

  document.body.addEventListener('click', (e) => {
    if (!tooltip.contains(e.target)) cmd.focus();
  });
  cmd.focus();
});

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>
